name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Revenant ${{ github.ref_name }}"
          releaseBody: |
            See the changelog for details.

            **Installation:**
            - **macOS:** Download the `.dmg` file and drag Revenant to Applications.
            - **Windows:** Download the `.exe` installer. Opens a new terminal after install to pick up the PATH change.

            > **Windows PATH note:** Run `revenant --version` in a new terminal after installation to verify the PATH is set correctly.
          releaseDraft: true
          prerelease: false

      - name: Upload macOS installer
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: revenant-${{ github.ref_name }}-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: revenant-${{ github.ref_name }}-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
