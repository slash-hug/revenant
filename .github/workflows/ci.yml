name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**", "refactor/**", "docs/**", "ci/**", "test/**"]
  pull_request:
    branches: [main]

jobs:
  security-guard:
    name: Security guard (no fs/shell escalation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # All file I/O is routed through path-confined Rust IPC commands. A webview
      # `fs:`/`shell:` capability or a tauri-plugin-fs/shell init would bypass that
      # confinement — fail the build if either is reintroduced (security #23).
      - name: No fs/shell capability or plugin
        run: |
          set -e
          if grep -REn '"(fs|shell):' src-tauri/capabilities/; then
            echo "::error::Forbidden fs:/shell: capability — file I/O must stay in Rust IPC (#23)."; exit 1
          fi
          if grep -REn 'tauri_plugin_(fs|shell)::init' src-tauri/src/; then
            echo "::error::tauri-plugin-fs/shell init reintroduced (#23)."; exit 1
          fi
          echo "OK — no fs/shell escalation."

  audit:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install npm dependencies (ci, lockfile-exact)
        run: npm ci
      # Gate on PRODUCTION dependencies — the surface actually shipped in the app.
      # DOMPurify is the sole XSS barrier, so its floor is load-bearing (#27).
      # Dev/build tooling (esbuild → vite → vitest) carries its own dev-server-only
      # advisories that don't ship; tracked separately, not gated here.
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Fails on RUSTSEC *vulnerabilities*. Unmaintained/unsound *warnings* from
      # the transitive Tauri/GTK/wry stack (unic-*, glib, …) are out of our control
      # and do not fail the default audit.
      - name: cargo audit
        run: cargo audit -f src-tauri/Cargo.lock

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run frontend tests
        run: npm test

      - name: TypeScript + Svelte type check (svelte-check catches .svelte errors tsc misses)
        run: npm run check

      - name: Frontend build (produces dist/)
        run: npm run build

  build-tauri:
    name: Tauri build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The Tauri CLI ships as an npm devDependency here, not a cargo
          # subcommand — run it via the npm "tauri" script.
          tauriScript: npm run tauri --

      # Launch smoke (tasks/lessons.md): build + unit tests passing does NOT prove
      # the binary boots. Two ship-time crashes survived green CI because nothing
      # ran the app — a cli-plugin config panic before the window, and a macOS
      # didFinishLaunching Obj-C exception (zero-size icon). Launch the built
      # binary and require it to stay alive; if it aborts on startup the process
      # exits early and this fails. Runs per-OS so a platform-specific launch
      # crash (like the macOS one) is caught on that platform.
      - name: Launch smoke (app boots without crashing)
        shell: bash
        run: |
          set -u
          case "$RUNNER_OS" in
            Windows) BIN="src-tauri/target/release/revenant.exe" ;;
            *)       BIN="src-tauri/target/release/revenant" ;;
          esac
          if [ ! -x "$BIN" ]; then echo "::error::built binary not found at $BIN"; exit 1; fi
          "$BIN" &
          PID=$!
          sleep 15
          if kill -0 "$PID" 2>/dev/null; then
            echo "OK — Revenant booted and stayed alive 15s."
            kill "$PID" 2>/dev/null || true
            # give it a moment, then SIGKILL if still around
            sleep 2; kill -9 "$PID" 2>/dev/null || true
          else
            wait "$PID" 2>/dev/null; code=$?
            echo "::error::Revenant crashed on launch (exit $code) — see tasks/lessons.md launch-smoke gate."
            exit 1
          fi

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: revenant-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: revenant-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
